# 服务定义：Redis + MySQL
services:
  # Redis 服务
  redis:
    image: redis:7-alpine  # 轻量级 Redis 7 镜像
    container_name: redis-server
    restart: always  # 开机自启
    ports:
      - "6379:6379"  # 主机端口:容器端口
    command: redis-server --requirepass 123456  # 设置 Redis 密码
    volumes:
      - redis-data:/data  # 使用 Docker 命名卷，避免在项目目录生成数据文件
    networks:
      - redis-mysql-network

  # MySQL 服务
  mysql:
    image: mysql:8.0  # MySQL 8.0 稳定版
    container_name: mysql-server
    restart: always
    ports:
      - "3306:3306"  # 主机端口:容器端口
    environment:
      MYSQL_ROOT_PASSWORD: 123456      # root 密码
      MYSQL_DATABASE: game_db          # 自动创建的数据库（可选）
      MYSQL_USER: game_app             # 普通用户（可选）
      MYSQL_PASSWORD: 123456           # 普通用户密码（可选）
    volumes:
      - mysql-data:/var/lib/mysql    # 使用 Docker 命名卷，避免在项目目录生成数据文件
    networks:
      - redis-mysql-network
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci  # 支持完整 UTF-8 和 Emoji

# 网络定义（名称可自定义）
networks:
  redis-mysql-network:
    driver: bridge

# 命名卷由 Docker 管理，不会写入当前项目目录。
volumes:
  redis-data:
  mysql-data:
